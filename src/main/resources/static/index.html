<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Temperatura</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; }
        #status {
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .connected { background-color: #d4edda; color: #155724; }
        .disconnected { background-color: #f8d7da; color: #721c24; }
        
        #dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.5s;
            text-align: center;
        }
        
        .card:hover { transform: translateY(-5px); }
        
        .cidade { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .temp { font-size: 2.5rem; margin: 10px 0; }
        .desc { font-style: italic; color: #666; }
        .horario { font-size: 0.8rem; color: #999; margin-top: 15px; }

        .frio { border-top: 8px solid #007bff; background-color: #e3f2fd; }
        .calor { border-top: 8px solid #dc3545; background-color: #fbe9e7; }
        .temperado { border-top: 8px solid #ffc107; background-color: #fffde7; }
    </style>
</head>
<body>
    <h1>Monitoramento Climático em Tempo Real</h1>
    <div id="status" class="disconnected">Status: Desconectado</div>
    
    <div id="dashboard">
        <!-- Cards serão inseridos aqui -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
